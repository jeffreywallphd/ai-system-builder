apiVersion: v1
kind: Namespace
metadata:
  name: ai-system-builder-runners
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: runner-quota
  namespace: ai-system-builder-runners
spec:
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: 8Gi
    requests.ephemeral-storage: 2Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    limits.ephemeral-storage: 4Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: runner-limits
  namespace: ai-system-builder-runners
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 32Mi
      default:
        cpu: "1"
        memory: 512Mi
        ephemeral-storage: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
        ephemeral-storage: 512Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: runner-default-deny
  namespace: ai-system-builder-runners
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-system-builder-runner
  namespace: ai-system-builder-runners
automountServiceAccountToken: false
---
# Suspended qualification specimen. The deployment controller must create one
# immutable job per admitted run; do not unsuspend this placeholder directly.
apiVersion: batch/v1
kind: Job
metadata:
  name: replace-with-opaque-run-id
  namespace: ai-system-builder-runners
  labels:
    app.kubernetes.io/name: ai-system-builder-runner
    tenant.ai-system-builder.io/scope: replace-with-opaque-tenant-scope
    run.ai-system-builder.io/id: replace-with-opaque-run-id
spec:
  suspend: true
  backoffLimit: 0
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-system-builder-runner
        tenant.ai-system-builder.io/scope: replace-with-opaque-tenant-scope
        run.ai-system-builder.io/id: replace-with-opaque-run-id
    spec:
      restartPolicy: Never
      serviceAccountName: ai-system-builder-runner
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runner
          image: registry.example.invalid/ai-system-builder-runner@sha256:REPLACE_WITH_64_HEX_DIGEST
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          lifecycle:
            preStop:
              httpGet:
                path: /control/cancel
                port: health
          ports:
            - name: health
              containerPort: 3011
          env:
            - name: SYSTEM_DEPLOYMENT_ID
              value: replace-with-opaque-deployment-id
            - name: SYSTEM_RUN_ID
              value: replace-with-opaque-run-id
            - name: SYSTEM_SECRET_REFERENCE
              valueFrom:
                secretKeyRef:
                  name: replace-with-run-secret-references
                  key: opaque-reference
          startupProbe:
            httpGet:
              path: /health/startup
              port: health
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: health
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: "1"
              memory: 512Mi
              ephemeral-storage: 128Mi
          volumeMounts:
            - name: temporary-storage
              mountPath: /tmp
      volumes:
        - name: temporary-storage
          emptyDir:
            sizeLimit: 64Mi
